name: n2v_bsp
channels:
  - conda-forge
  - bioconda
  - defaults
  - https://repo.anaconda.com/pkgs/main
  - https://repo.anaconda.com/pkgs/r
dependencies:
  - python=3.9.0
  - hdf5=1.10.6
  - imageio=2.36.1
  - ipython[version='8.12.2.*,8.12.2.*']
  - keras-applications=1.0.8
  - keras[version='2.10.0.*,2.10.0.*']
  - matplotlib-base=3.8.4
  - numpy=1.22.4
  - pandas=2.2.2
  - scipy=1.10.1
  - tensorflow=2.10.0
  - tifffile=2023.8.12
  - libgfortran
  - libgfortran5
  - natsort
  - pip
  # n2v/csbdeep are pip-only. n2v 0.3.1 downgrades keras to 2.3.1 (breaks
  # tensorflow.keras), so re-pin tensorflow==2.10.0 in the SAME pip step to keep
  # keras 2.10.0. (See n2v.softenv.txt.) On Windows, create with a SHORT pkgs
  # cache to dodge the 260-char path limit on TensorFlow's MLIR headers, e.g.
  #   CONDA_PKGS_DIRS=C:\cp  conda env create -f n2v.environment.yaml
  - pip:
    - n2v==0.3.1
    - csbdeep==0.6.3
    - h5py==3.12.1
    - tensorflow==2.10.0

