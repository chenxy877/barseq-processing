###################### Experiment-Specific Definitions #########################
[project]
project_id=YWT011357_4T
project_leader=Anthony Zador
project_institution=CSHL

[experiment]
modes = geneseq,hyb
#stages = denoise-geneseq, denoise-hyb, background, regchannels, bleedthrough
stages = denoise-geneseq, denoise-hyb, 
    # background, regchannels, bleedthrough, 
    preprocess-geneseq, preprocess-hyb,
    regcycle-geneseq, regcycle-hyb,
    rgbout-hyb, rgbout-geneseq,  
    segment, merge-segment, 
    stitch, merge-stitch,
    calc-params, 
    basecall-geneseq, merge-basecall-geneseq, 
    basecall-hyb, merge-basecall-hyb,
    aggregate-cellids, aggregate-transform, aggregate-data, filter-data

microscope_profile=nikon_eclipse_ti2
input_dir = E:/git/barseq_processing_python/scratch/d077_input

[geneseq]
channels=G,T,A,C,BF

[hyb]
channels=GFP,YFP,TxRed,Cy5,DAPI,BF
#channels=GFP,YFP,TXR,CY5,DAPI,BF


[tile]
microscope_profile=nikon_eclipse_ti2
# proportion of overlap
# overlap=.15
# percentage
horizontal_overlap=0.23
vertical_overlap=0.23

[maxproj]
microscope_profile=nikon_eclipse_ti2
maxproj_regex=MAX_Pos(\d*)_(\d*)_(\d*).tif


###################### Tool Configuration #########################
#  Tool parameters may still be specific to this experiment, but are
#  only relevant to that tool.
[n2v]
conda_env = n2v_bsp

geneseq_model_stem = n2v_singleseq
geneseq_model_channels = G,T,A,C

hyb_model_stem = n2v_hyb_20230323
hyb_model_channels = GFP,YFP,TxRed,Cy5
#hyb_model_channels = GFP,YFP,TXR,CY5

do_min_subtraction = True

# how many sub_commands to run at once.
n_jobs = 32
# if program is multi-threaded
n_threads = 1

[cv2]
conda_env = barseq_bsp
radius=31
# how many sub_commands to run at once.
n_jobs = 32
# if program is multi-threaded
n_threads = 1

[ski]
conda_env = barseq_bsp
n_jobs = 32
n_threads = 1

[np]
conda_env = barseq_bsp
n_jobs = 32
n_threads = 1

[mist]
fiji_path=/Applications/Fiji.app
conda_env = fiji-mist
n_jobs = 32
n_threads = 1

[ashlar]
conda_env = ashlar_bsp
n_jobs = 1
n_threads = 1

flip_y = False
flip_x = True
# pattern=MAX_Pos1_{col:03}_{row:03}.tif

[bardensr]
conda_env = bardensr_bsp
# basecall-geneseq is per-FOV (n_chunks=1) -> parallelize across FOVs. calc-params
# is one global command (n_chunks=50, needs all FOVs for the threshold) so n_jobs
# does not help it -- its internal per-FOV loops are parallelized with joblib in
# calc-params_bardensr.py instead (uses this n_jobs). 32-core / 256GB box: 32 workers
# (~5GB each ~160GB) is safe. Cap per-process BLAS/TF threads (OMP_NUM_THREADS=1 etc.)
# in the run env so 32 single-threaded workers map to 32 cores without oversubscription.
n_jobs = 32
n_threads = 1

[cellpose]
conda_env = cellpose_bsp
n_jobs = 32
n_threads = 1

[pd]
# pandas-based processing
conda_env = barseq_bsp
n_jobs = 32
n_threads = 1

[py]
# vanilla Python-based processing. 
conda_env = barseq_bsp
n_jobs = 32
n_threads = 1

###################### Workflow Stages #########################
#
#   

[denoise-geneseq]
desc = Denoise each geneseq image.
script_base = denoise
tool = n2v
maptype = position
modes= geneseq
stagedir = denoised
instage = None
image_type = geneseq

[denoise-hyb]
desc = Denoise each hyb image.
script_base = denoise
tool = n2v
maptype = position
modes=hyb
stagedir = denoised
instage = None
image_type = hyb

[denoise-dummy]
desc = Dummy stage to merge geneseq and hyb.
modes=geneseq,hyb
stagedir = denoised

[background]
desc = Subtract background from each geneseq and hyb image.
maptype = position
modes=geneseq,hyb
script_base = background
tool= cv2
stagedir = background
instage = denoise-dummy
instage_modes = geneseq,hyb
arity = parallel


[regchannels]
desc = Register all channels within each image.
maptype = position
modes=geneseq,hyb
script_base = regchannels
tool = ski
stagedir = regchannels
instage = background
instage_modes = geneseq,hyb
arity = parallel

is_affine = False

[bleedthrough]
desc = Perform bleedthrough correction on each image.
maptype = position
modes=geneseq,hyb
script_base = bleedthrough
stagedir = bleedthrough
tool = np
instage = regchannels
instage_modes = geneseq,hyb

[preprocess-geneseq]
desc = Perform background, regchannels, and bleedthrough correction on each image.
maptype = position
modes=geneseq
image_type = geneseq
script_base = preprocess
stagedir = preprocess
tool = py
instage = denoise-geneseq
instage_modes = geneseq

is_affine = False
# MATLAB gene_ball_radius (default_settings.json). Grayscale 'ball' SE.
background_radius = 6
background_channels = G,T,A,C,BF
regchannel_channels = G,T,A,C,BF
bleedthrough_channels = G,T,A,C,BF


[preprocess-hyb]
desc = Perform background, regchannels, and bleedthrough correction on each image.
maptype = position
modes=hyb
image_type = hyb
script_base = preprocess
stagedir = preprocess
tool = py
instage = denoise-hyb
instage_modes = hyb

is_affine = False
# MATLAB hyb background radius (scope_settings hyb_radius=100). Grayscale 'ball' SE.
background_radius = 100
background_channels = GFP,YFP,TxRed,Cy5,DAPI,BF
regchannel_channels = GFP,YFP,TxRed,Cy5,DAPI,BF
bleedthrough_channels = GFP,YFP,TxRed,Cy5,DAPI,BF


[regcycle-geneseq]
desc =  Register all geneseq cycles to first geneseq cycle
maptype = tileset
modes = geneseq
image_type = geneseq
# instage = bleedthrough
instage = preprocess-geneseq
instage_modes = geneseq
stagedir = regcycle
# process all
num_cycles = 99
arity = parallel

# use first cycle as template.
template_mode = geneseq
# template_source =  bleedthrough
template_source = preprocess-geneseq   
script_base = regcycle-geneseq
tool = ski

# MATLAB alignseq_maxthresh constants (hardcoded in mmseqalignment...highres.m)
subsample_rate = 4
resize_factor = 5
block_size = 256
# geneseq: no soma masking (thresh=0); disk top-hat radius 10 (resized px)
intensity_max_thresh = 0
reg_disk_radius = 10
num_initial_channels=5
num_later_channels=4
num_channels = 4


[regcycle-hyb]
desc =  Register hyb cycle(s) to first geneseq cycle
template_mode = geneseq
template_source = regcycle-geneseq
template_image_type = geneseq   
template_select_channels = G,T,A,C
maptype = tileset
modes = hyb
# currently only one hyb cycle, but in principle do all.
num_cycles = 99
arity = parallel
image_type = hyb
stagedir = regcycle
# instage = bleedthrough
instage = preprocess-hyb
instage_modes = hyb
script_base = regcycle-hyb
tool = ski

# select and registration channels for hyb
select_channels = GFP,YFP,TxRed,Cy5,DAPI,BF
reg_channels = TxRed
# MATLAB mmalignhybtoseq_local: extra ball-chradius top-hat on the reg channel
# (chradius=30 for D077), then register the reg channel to the geneseq-sum
# template by block cross-correlation (same as geneseq alignseq_maxthresh).
reg_channel_radius = 30
block_size = 256
resize_factor = 5
subsample_rate = 4
intensity_max_thresh = 0
reg_disk_radius = 10



[regcycle-dummy]
desc = Dummy stage to merge geneseq and hyb.
modes = hyb, geneseq
stagedir = regcycle

[rgbout-hyb]
desc =  Calculate input parameters for bardensr using all inputs.
image_type = hyb
maptype = position
modes = hyb
stagedir = rgbout
instage = regcycle-hyb
instage_modes = hyb
arity = parallel
script_base = rgbout-hyb
tool = py

channels = GFP,YFP,TxRed,Cy5
strength = 0.6

