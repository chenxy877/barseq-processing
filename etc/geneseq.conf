resource_dir = E:/git/barseq_processing_python/resource
#
# STAGE PARAMETER DEFAULTS
# 
desc = Workflow stage with no description.
#arity = single
arity = parallel
instage = None
instage_modes = None
label = None
ext = None
output_dtype = uint16

# Handle multiple maps in single job/process
# Produces command lines with multiple --infiles --outfiles --template arguments
n_chunks = 1

# Intended to match filename minus extension. 
file_regex = MAX_Pos(\d*)_(\d*)_(\d*)

# include leading string in position id group(1)
position_regex = MAX_(Pos\d)_(\d*)_(\d*)
position_group = 1
column_group = 2
row_group = 3

# Remove leading base (filename) from output
# Used to produce experiment-wide global output files. 
strip_base = False

# template_mode  which modality should be the fixed template to refer to? 
#    This allows us to point to another mode for reference.  
# template_source = <stage> which stage tree should the fixed template come from.   
template_mode = None
template_source = None
num_cycles = 99



###################### General BARseq Processing Conventions #########################
[barseq]
# standard processing filename and directory name patterns
bcseq_regex = bcseq(.*)
geneseq_regex = geneseq(.*) 
hyb_regex = hyb(.*)
#hyb_regex = hybseq_(.*)
image_regex = MAX_Pos(\d*)_(\d*)_(\d*)
position_group = 1
column_group = 2
row_group = 3

# image_pattern should match filename WITHOUT extension. 
# i.e. retain option of adjusting inbound and outbound file formats...
image_pattern = MAX_Pos{pos}_{col:03}_{row:03}$
image_ext = tif
image_types = geneseq,bcseq,hyb

######################  Microscope Parameters  ####################
[nikon_eclipse_ti2]
image_regex = xy(.*)z(.*)c(.*)
fov_pixels_x=3200
fov_pixels_y=3200
# in um
pixel_size=0.33

# D077 run_barseq config.json calibration: chshift20x-20220218.mat +
# chprofile20x-50-30-20-40-20220218.mat (NOT the older a00/alder chshift -- the
# alder chshift differs on ch0/ch1 and caused a geneseq threshold residual).
channel_shift_geneseq = chshift20x-20220218.tsv
channel_profile_geneseq = chprofile20x-50-30-20-40-20220218.tsv

channel_shift_bcseq = chshift20x-20220218.tsv
channel_profile_bcseq = chprofile20x-50-30-20-40-20220218.tsv

channel_shift_hyb = chshift20x-hyb-alder_py.tsv
channel_profile_hyb = chprofile20x-hyb-50-30-20-40-20220218.tsv

#channel_shift=chshift20x-20220218.tsv
#channel_profile=chprofile20x-50-30-20-40-20220218.tsv

# CSHL NIKON
#
# chshift_filename_geneseq='chshift20x-NIKON-18-May-2025_py.mat'        #'chshift20x-20220218.mat'#
# chprofile_filename_geneseq='chprofilegene20x-NIKON-20-May-2025.mat'   #'chprofile20x-50-30-20-40-20220218.mat'#
# chshift_filename_bcseq='chshift20x-NIKON-18-May-2025_py.mat'          #'chshift20x-20220218.mat'#
# chprofile_filename_bcseq='chprofilegene20x-NIKON-20-May-2025.mat'     #'chprofile20x-50-30-20-40-20220218.mat'#
# chshift_filename_hyb='chshifthyb20x-NIKON-18May25_py.mat'             #'chshifthyb_alder.mat'#
# chprofile_filename_hyb='chprofile20x-hyb-50-30-20-40-20220218.mat'    #'chprofilehyb_alder'#

