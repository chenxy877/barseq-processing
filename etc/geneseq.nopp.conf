###################### Experiment-Specific Definitions #########################
[project]
project_id=YWT011357_4T
project_leader=Anthony Zador
project_institution=CSHL

[experiment]
modes = geneseq,hyb
#stages = denoise-geneseq, denoise-hyb, background, regchannels, bleedthrough
stages = denoise-geneseq, denoise-hyb, 
    background, regchannels, bleedthrough, 
    # preprocess-geneseq, preprocess-hyb,
    regcycle-geneseq, regcycle-hyb,
    rgbout-hyb, rgbout-geneseq,  
    segment, merge-segment, 
    stitch, merge-stitch,
    calc-params, 
    basecall-geneseq, merge-basecall-geneseq, 
    basecall-hyb, merge-basecall-hyb,
    aggregate-cellids, aggregate-transform, aggregate-data, filter-data

microscope_profile=nikon_eclipse_ti2 
input_dir = ~/data/barseq/test-data/YWT011357_4T

[geneseq]
channels=G,T,A,C,BF

[hyb]
channels=GFP,YFP,TxRed,Cy5,DAPI,BF
#channels=GFP,YFP,TXR,CY5,DAPI,BF


[tile]
microscope_profile=nikon_eclipse_ti2
# proportion of overlap
# overlap=.15
# percentage
horizontal_overlap=0.23
vertical_overlap=0.23

[maxproj]
microscope_profile=nikon_eclipse_ti2
maxproj_regex=MAX_Pos(\d*)_(\d*)_(\d*).tif


###################### Tool Configuration #########################
#  Tool parameters may still be specific to this experiment, but are
#  only relevant to that tool.
[n2v]
conda_env = n2v_bsp

geneseq_model_stem = n2v_seq_20220204_
geneseq_model_channels = G,T,A,C

hyb_model_stem = n2v_hyb_20230323
hyb_model_channels = GFP,YFP,TxRed,Cy5
#hyb_model_channels = GFP,YFP,TXR,CY5

do_min_subtraction = True

# how many sub_commands to run at once.
n_jobs = 8
# if program is multi-threaded
n_threads = 1

[cv2]
conda_env = barseq
radius=31
# how many sub_commands to run at once.
n_jobs = 8
# if program is multi-threaded
n_threads = 1

[ski]
conda_env = barseq
n_jobs = 8
n_threads = 1

[np]
conda_env = barseq
n_jobs = 8
n_threads = 1

[mist]
fiji_path=/Applications/Fiji.app
conda_env = fiji-mist
n_jobs = 8
n_threads = 1

[ashlar]
conda_env = ashlar
n_jobs = 1
n_threads = 1

flip_y = False
flip_x = True
# pattern=MAX_Pos1_{col:03}_{row:03}.tif

[bardensr]
conda_env = bardensr_bsp
n_jobs = 1
n_threads = 1

[cellpose]
conda_env = cellpose_bsp
n_jobs = 8
n_threads = 1

[pd]
# pandas-based processing
conda_env = barseq
n_jobs = 8
n_threads = 1

[py]
# vanilla Python-based processing. 
conda_env = barseq
n_jobs = 8
n_threads = 1

###################### Workflow Stages #########################
#
#   

[denoise-geneseq]
desc = Denoise each geneseq image.
script_base = denoise
tool = n2v
maptype = position
modes= geneseq
stagedir = denoised
instage = None
image_type = geneseq

[denoise-hyb]
desc = Denoise each hyb image.
script_base = denoise
tool = n2v
maptype = position
modes=hyb
stagedir = denoised
instage = None
image_type = hyb

[denoise-dummy]
desc = Dummy stage to merge geneseq and hyb.
modes=geneseq,hyb
stagedir = denoised

[background]
desc = Subtract background from each geneseq and hyb image.
maptype = position
modes=geneseq,hyb
script_base = background
tool= cv2
stagedir = background
instage = denoise-dummy
instage_modes = geneseq,hyb
arity = parallel


[regchannels]
desc = Register all channels within each image.
maptype = position
modes=geneseq,hyb
script_base = regchannels
tool = ski
stagedir = regchannels
instage = background
instage_modes = geneseq,hyb
arity = parallel

is_affine = False

[bleedthrough]
desc = Perform bleedthrough correction on each image.
maptype = position
modes=geneseq,hyb
script_base = bleedthrough
stagedir = bleedthrough
tool = np
instage = regchannels
instage_modes = geneseq,hyb

[preprocess-geneseq]
desc = Perform background, regchannels, and bleedthrough correction on each image.
maptype = position
modes=geneseq
script_base = preprocess
stagedir = preprocess
tool = py
instage = denoise-geneseq
instage_modes = geneseq

is_affine = False

[preprocess-hyb]
desc = Perform background, regchannels, and bleedthrough correction on each image.
maptype = position
modes=hyb
script_base = preprocess
stagedir = preprocess
tool = py
instage = denoise-hyb
instage_modes = hyb

is_affine = False

[regcycle-geneseq]
desc =  Register all geneseq cycles to first geneseq cycle
maptype = tileset
modes = geneseq
instage = bleedthrough
#instage = preprocess-geneseq
instage_modes = geneseq
stagedir = regcycle
# process all
num_cycles = 99
arity = parallel

# use first cycle as template.
template_mode = geneseq
template_source =  bleedthrough
# template_source = preprocess-geneseq   
script_base = regcycle
tool = ski

subsample_rate = 4
do_coarse = False
resize_factor = 2
block_size = 128
num_initial_channels=5
num_later_channels=4
num_channels = 4

[regcycle-hyb]
desc =  Register all hyb cycles to first geneseq cycle
template_mode = geneseq
template_source = regcycle-geneseq   
maptype = tileset
modes = hyb
stagedir = regcycle
instage = bleedthrough
# instage = preprocess-hyb
instage_modes = hyb
script_base = regcycle
tool = ski

subsample_rate = 4
do_coarse = False
resize_factor = 2
block_size = 128
num_initial_channels=5
num_later_channels=4
num_channels = 4


[rgbout-hyb]
desc =  Calculate input parameters for bardensr using all inputs.
image_type = hyb
maptype = position
modes = hyb
stagedir = rgbout
instage = regcycle-hyb
instage_modes = hyb
arity = parallel
script_base = rgbout-hyb
tool = py

channels = GFP,YFP,TxRed,Cy5
strength = 0.6

[rgbout-geneseq]
desc =  Calculate input parameters for bardensr using all inputs.
image_type = geneseq
maptype = tileset
modes = geneseq
stagedir = rgbout
instage = regcycle-geneseq
instage_modes = geneseq
arity = parallel
script_base = rgbout-geneseq
tool = py

channels = G,T,A,C
strength = 0.6


[calc-params]
desc =  Calculate input parameters for bardensr using all inputs.
image_type = geneseq
maptype = tileset
modes = geneseq
stagedir = basecall
instage = regcycle-geneseq
instage_modes = geneseq
arity = single
file_regex = MAX_Pos(\d*)_(\d*)_(\d*).bardensrparams
label = bardensrparams
ext = json
strip_base = False
num_cycles = 99
script_base = calc-params
tool = bardensr

# base order determines binary mapping
# e.g. 8 4 2 1 
codebook_bases = G,T,A,C
codebook_file = codebook_geneseq.tsv
trim=160
cropf=0.4
fdrthresh=0.05
noisefloor_ini=0.01
noisefloor_final=0.05


[basecall-geneseq]
desc =  Basecall geneseq cycles.  
image_type = geneseq
maptype = tileset
modes = geneseq
stagedir = basecall
instage = regcycle-geneseq
instage_modes = geneseq
arity = single
file_regex = MAX_Pos(\d*)_(\d*)_(\d*).bardensrresult 
label = bardensrresult
ext = csv
num_cycles = 99
script_base = basecall-geneseq
tool = bardensr

# base order determines binary mapping
# e.g. 8 4 2 1 
codebook_bases = G,T,A,C
codebook_file = codebook_geneseq.tsv
fdrthresh=0.05
trim=160
cropf=0.4
noisefloor_ini=0.01
noisefloor_final=0.05
# 0.5383558564715916  # from calc_bardensr_parameters. 
# intensity_thresh=0.538355856


[basecall-hyb]
desc =  Basecall hyb cycle(s).
image_type = hyb
maptype = tileset
modes = hyb
stagedir = basecall
instage = regcycle-hyb
instage_modes = hyb
arity = single
label = genehyb
ext = joblib
file_regex = MAX_Pos(\d*)_(\d*)_(\d*).genehyb 
strip_base = False
num_cycles = 1
script_base = basecall-hyb
tool = ski

codebook_file = codebook_hyb.tsv
codebook_channels = 1,2,4
trim=160
cropf=0.4

num_c=4
thresh=[50,60,40,30]
prominence=[50,10,40,10]
all_genes_ch=2
relaxed=True
no_deconv=True
filter_overlap=0

#channels=GFP,YFP,TXR,CY5,DAPI,BF
basecall_channels = GFP,YFP,TXR,CY5


[segment]
desc =  Segment hyb cycle(s).
image_type = hyb
maptype = tileset
modes = hyb
stagedir = segment
instage = regcycle-hyb
instage_modes = hyb
# assumes regcycle-hyb and regcycle-geneseq are in same input dir 
# i.e. regcycle directory
num_cycles = 1
script_base = segment
arity = single
# output will go to first mode (hyb)
tool = cellpose
label = cp_mask_cyto3
ext = tif
file_regex = MAX_Pos(\d*)_(\d*)_(\d*).cp_mask_cyto3 
model_name = cyto3
cell_diameter = 40


[stitch]
desc =  Stitch positions using hyb cycle.
maptype = position
modes= hyb
num_cycles = 1
# channels=1,2,3,4,5
channels=4
file_regex = MAX_Pos(\d*)_(\d*)_(\d*).tform_original
script_base = stitch
stagedir = stitch
tool = ashlar
output_dtype = uint16
instage = regcycle-hyb
instage_modes = hyb
arity = single
# label = positions
# ext = tsv
strip_base = False
label = tform_original
ext = joblib

[merge-segment]
desc =  Merge per-image segmentation data.
maptype = cycle
modes = hyb
stagedir = merge
instage = segment
instage_modes = hyb
num_cycles = 1
script_base = merge-segment
tool = ski 
arity = single
file_regex = all_segmentation
label = all_segmentation
strip_base = True
ext = joblib

dilation_radius=3

[merge-basecall-geneseq]
desc =  Merge all per-image geneseq basecalls. 
maptype = cycle
modes = geneseq
num_cycles = 1
stagedir = merge
instage = basecall-geneseq
instage_modes = geneseq
arity = single
file_regex = basecalls
label = basecalls
ext = joblib
strip_base = True
script_base = merge-basecall-geneseq
tool = pd 

[merge-basecall-hyb]
desc =  Merge all per-image hyb basecalls. 
maptype = cycle
modes = hyb
num_cycles = 1
stagedir = merge
instage = basecall-hyb
instage_modes = hyb
arity = single
file_regex = genehyb
label = genehyb
ext = joblib
strip_base = True
script_base = merge-basecall-hyb
tool = pd 

[merge-stitch]
desc =  Merge/transform stitched positions. 
maptype = cycle
modes = hyb
stagedir = merge
instage = stitch
instage_modes = hyb
arity = single
file_regex = tforms_original
label = tforms_original
ext = joblib
strip_base = True
script_base = merge-stitch-ashlar
tool = pd

transform_rescale_factor=0.5
intensity_scaling=3
tilesize=3200
display_additional_rescale=0.2

[merge-dummy]
desc =  Dummy stage to gather data files.
# pulls together all files (from multiple stages) 
# in the merge directory, for use by a single stage
modes = hyb,geneseq
num_cycles = 1
stagedir = merge
instage = merge-segment
instage_modes = hyb,geneseq
arity = parallel
file_regex = all_segmentation, basecalls, cell_id, genehyb, lroi10x, tforms_final, tforms_original, tforms_rescaled0p5   
label = all_segmentation
ext = joblib
strip_base = True
script_base = None
tool = py


[aggregate-cellids]
desc = Aggregate and assign cellids. 
maptype = cycle
modes = hyb
stagedir = merge
instage = merge-dummy
instage_modes = hyb,geneseq
arity = single
file_regex = cell_id
label = cell_id
ext = joblib
strip_base = True
script_base = aggregate-cellids
tool = py

[aggregate-transform]
desc = Aggregate and transform further. 
maptype = cycle
modes = hyb
stagedir = merge
instage = merge-dummy
instage_modes = hyb,geneseq
arity = single
file_regex = lroi10x
label = lroi10x
ext = joblib
strip_base = True
script_base = aggregate-transform
tool = np

[aggregate-data]
desc = Aggregate all data further. 
maptype = cycle
modes = hyb
stagedir = aggregated
instage = merge-dummy
instage_modes = hyb, geneseq
arity = single
file_regex = processeddata, alldata
label = processeddata
ext = joblib
strip_base = True
script_base = aggregate-data
tool = py

starting_slice_idx=1
starting_fov_idx=1
dummy_cell_num=10000
tilesize=3200
fraction_border=0.07

[filter-data]
desc = Remove overlapping double-counted data.
maptype = cycle
modes = hyb
stagedir = aggregated
instage = aggregate-data
instage_modes = hyb
arity = single
file_regex = filt_neurons
label = filt_neurons
ext = joblib
strip_base = True
script_base = filter-data
tool = py

rescale_factor = 0.5
px = 0.33
box_half_width_um = 5
search_radius_um = 200